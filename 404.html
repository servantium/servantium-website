<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Servantium</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-servantium-green: #00C26D;
            --color-green-hover: #00A95E;
            --color-deep-forest: #023E25;
            --color-soft-mint: #E8FBF1;
            --color-ink: #0D0D0D;
            --color-ink-light: #3d3d3d;
            --color-ink-muted: #6b6b6b;
            --color-white: #FFFFFF;
            --color-mist-grey: #F5F6F7;
            --color-cloud-grey: #E1E3E6;
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            color: var(--color-ink);
            background: linear-gradient(180deg, var(--color-white) 0%, var(--color-mist-grey) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            padding: 1.5rem 2.5rem;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--color-cloud-grey);
        }

        .logo-image {
            height: 40px;
            width: auto;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .error-visual {
            position: relative;
            margin-bottom: 2rem;
        }

        .error-code {
            font-family: var(--font-display);
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 400;
            color: var(--color-servantium-green);
            line-height: 1;
            opacity: 0.15;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .lost-astronaut {
            position: relative;
            z-index: 1;
            width: 180px;
            height: 180px;
        }

        .astronaut-body {
            fill: var(--color-white);
            stroke: var(--color-ink);
            stroke-width: 2;
        }

        .astronaut-visor {
            fill: var(--color-servantium-green);
            opacity: 0.8;
        }

        .astronaut-detail {
            fill: none;
            stroke: var(--color-ink-muted);
            stroke-width: 1.5;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .lost-astronaut {
            animation: float 4s ease-in-out infinite;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--color-servantium-green);
            border-radius: 50%;
            opacity: 0.4;
        }

        .star:nth-child(1) { top: 10%; left: 20%; animation: twinkle 2s ease-in-out infinite; }
        .star:nth-child(2) { top: 30%; left: 80%; animation: twinkle 2.5s ease-in-out infinite 0.5s; }
        .star:nth-child(3) { top: 70%; left: 15%; animation: twinkle 1.8s ease-in-out infinite 1s; }
        .star:nth-child(4) { top: 60%; left: 85%; animation: twinkle 2.2s ease-in-out infinite 0.3s; }
        .star:nth-child(5) { top: 85%; left: 50%; animation: twinkle 2s ease-in-out infinite 0.7s; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 400;
            margin-bottom: 1rem;
            color: var(--color-ink);
        }

        h1 em {
            font-style: italic;
            color: var(--color-servantium-green);
        }

        p {
            font-size: 1.1rem;
            color: var(--color-ink-muted);
            max-width: 400px;
            margin-bottom: 2rem;
            line-height: 1.7;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.875rem 1.75rem;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.2;
            text-decoration: none;
            transition: all 0.25s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--color-servantium-green);
            color: var(--color-white);
            border: 2px solid var(--color-servantium-green);
            box-shadow: 0 2px 8px rgba(0, 194, 109, 0.25);
        }

        .btn-primary:hover {
            background: var(--color-green-hover);
            border-color: var(--color-green-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 194, 109, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--color-ink);
            border: 2px solid var(--color-cloud-grey);
            margin-left: 0.75rem;
        }

        .btn-secondary:hover {
            border-color: var(--color-servantium-green);
            color: var(--color-servantium-green);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
        }

        footer {
            padding: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--color-ink-muted);
        }

        footer a {
            color: var(--color-servantium-green);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .actions {
                flex-direction: column;
            }
            .btn-secondary {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">
            <img src="logo.png" alt="Servantium" class="logo-image">
        </a>
    </nav>

    <div class="container">
        <div class="error-visual">
            <div class="stars">
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
                <div class="star"></div>
            </div>
            <span class="error-code">404</span>
            <svg class="lost-astronaut" viewBox="0 0 100 100">
                <!-- Helmet -->
                <circle cx="50" cy="40" r="25" class="astronaut-body"/>
                <!-- Visor -->
                <ellipse cx="50" cy="42" rx="15" ry="12" class="astronaut-visor"/>
                <!-- Body -->
                <rect x="35" y="60" width="30" height="25" rx="8" class="astronaut-body"/>
                <!-- Backpack -->
                <rect x="60" y="62" width="12" height="20" rx="3" class="astronaut-body"/>
                <!-- Left arm -->
                <rect x="20" y="65" width="18" height="8" rx="4" class="astronaut-body"/>
                <!-- Right arm -->
                <rect x="62" y="70" width="18" height="8" rx="4" class="astronaut-body"/>
                <!-- Antenna -->
                <line x1="50" y1="15" x2="50" y2="8" class="astronaut-detail"/>
                <circle cx="50" cy="6" r="3" fill="var(--color-servantium-green)"/>
                <!-- Helmet reflection -->
                <path d="M38 35 Q42 30 48 32" class="astronaut-detail" stroke="white" opacity="0.5"/>
            </svg>
        </div>

        <h1>Houston, we have a <em>problem</em></h1>
        <p>
            This page seems to have drifted off into space.
            Let's get you back to familiar territory.
        </p>

        <div class="actions">
            <a href="index.html" class="btn btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                Back to Home
            </a>
            <a href="about.html" class="btn btn-secondary">Learn About Us</a>
        </div>
    </div>

    <footer>
        Lost? <a href="mailto:hello@servantium.com">Contact us</a> and we'll help you find your way.
    </footer>
</body>
</html>
