name: Release Notes (preview)

# Fires when a PR merges to `develop`. Generates a draft release note
# on a bot branch and opens a review PR back into `develop`. When that
# PR merges, the release note is live on test.servantium.com. The
# later `develop -> main` promotion merge does NOT re-run this workflow,
# so content is written once and reused across environments.
#
# Can also be fired manually (workflow_dispatch) against any PR number,
# or via repository_dispatch from the app repo when Max cuts a release.

on:
  pull_request:
    types: [closed]
    # Fires on merges into the current test branch. `feature/astro-prototype`
    # is the active test branch until the 2-week cutover, then it gets
    # replaced by `develop`. Keeping both listed means the cutover is a
    # no-op for this workflow — delete `feature/astro-prototype` from the
    # list once the merge to main happens.
    branches: [feature/astro-prototype, develop]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number on this repo to generate notes for"
        required: false
      app_version:
        description: "App version if triggered outside of a PR (e.g. v1.4.0)"
        required: false
  repository_dispatch:
    types: [app-release]

jobs:
  release-notes:
    # Skip bot PRs to avoid loops; skip non-merged PR closes.
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.user.login != 'servantium-bot')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk@latest --no-save

      - name: Resolve PR context
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          case "${{ github.event_name }}" in
            pull_request)     PR="${{ github.event.pull_request.number }}" ;;
            workflow_dispatch) PR="${{ inputs.pr_number }}" ;;
            repository_dispatch) PR="" ;;
          esac
          echo "pr=$PR" >> $GITHUB_OUTPUT

          if [ -n "$PR" ]; then
            gh pr view "$PR" --json title,body,mergedAt,headRefName,url > /tmp/pr.json
            gh pr diff "$PR" | head -c 50000 > /tmp/diff.txt || true
          else
            jq -n --arg title "${{ inputs.app_version || github.event.client_payload.version || 'Release' }}" \
                  --arg body  "${{ github.event.client_payload.notes || '' }}" \
                  '{title: $title, body: $body, mergedAt: now|todate}' > /tmp/pr.json
            echo "${{ github.event.client_payload.diff || '' }}" > /tmp/diff.txt
          fi

      - name: Generate release note
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-sonnet-4-5
        run: |
          node .github/scripts/claude-run.mjs \
            --system .github/claude-prompts/release-note.system.md \
            --context /tmp/pr.json,/tmp/diff.txt \
            --out /tmp/note.mdx \
            --model "$CLAUDE_MODEL" \
            --max-tokens 2048

      - name: Open preview PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          PR="${{ steps.ctx.outputs.pr }}"
          DATE=$(date -u +%Y-%m-%d)
          TITLE=$(jq -r '.title // "release"' /tmp/pr.json)
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' \
                 | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' | head -c 50)
          BRANCH="bot/release-note-${PR:-$(date +%s)}"
          FILE="src/content/docs/help/release-notes/${DATE}-${SLUG}.mdx"

          git config user.name "servantium-bot"
          git config user.email "bot@servantium.com"
          git checkout -b "$BRANCH"
          mkdir -p "$(dirname "$FILE")"
          cp /tmp/note.mdx "$FILE"
          git add "$FILE"
          git commit -m "docs(release-notes): draft for PR #${PR:-manual}"
          git push -u origin "$BRANCH"

          # Base the draft PR on whichever branch triggered the workflow,
          # so the cutover from feature/astro-prototype to develop is a no-op.
          BASE_BRANCH="${GITHUB_BASE_REF:-feature/astro-prototype}"
          gh pr create \
            --base "$BASE_BRANCH" \
            --head "$BRANCH" \
            --title "docs: release notes draft for #${PR:-manual}" \
            --body "$(printf 'Auto-generated draft for PR #%s.\n\nReview, edit inline if needed, then merge. Content appears on test.servantium.com immediately after merge.\n\n---\n\n```mdx\n%s\n```' "${PR:-manual}" "$(cat /tmp/note.mdx)")"
