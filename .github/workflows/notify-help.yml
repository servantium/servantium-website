name: Notify help of site chrome change

# Fires when files consumed by servantium-help change.
# Directly triggers help's Cloudflare Pages deploy via a deploy hook URL
# stored as a repo secret. No GitHub PAT or cross-repo dispatch needed.

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/chrome/**'
      - 'public/logo.png'
      - 'public/favicon-*.png'
      - 'public/apple-touch-icon.png'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target branch
        id: target
        run: |
          # main -> production help; develop -> qa.help
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "hook=${{ secrets.HELP_DEPLOY_HOOK_MAIN }}" >> "$GITHUB_OUTPUT"
            echo "label=main (help.servantium.com)" >> "$GITHUB_OUTPUT"
          else
            echo "hook=${{ secrets.HELP_DEPLOY_HOOK_DEVELOP }}" >> "$GITHUB_OUTPUT"
            echo "label=develop (qa.help.servantium.com)" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger help rebuild (${{ steps.target.outputs.label }})
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ steps.target.outputs.hook }}")
          echo "Deploy hook HTTP $code"
          [ "$code" = "200" ] || exit 1
