name: Docs Pipeline - Write

# Stage 2: Triggered by the portal after the user approves the orchestrator's
# proposed actions. Writes/updates MDX files and opens a single bot PR.

on:
  # Primary trigger: workflow_dispatch by filename works from any branch
  # (repository_dispatch requires the workflow to be on the default branch,
  # which ours isn't until feature/astro-prototype merges to main).
  workflow_dispatch:
    inputs:
      batch_id:
        description: "Portal batch ID"
        required: true
      pr_number:
        description: "Original PR number"
        required: false
      version:
        description: "Semver (e.g. 1.3.0)"
        required: false
      repo:
        description: "servantium-website or servantium"
        required: false
        default: "servantium-website"
      approved_actions:
        description: "JSON array of approved actions"
        required: true
  # Kept for future when the pipeline is on main.
  repository_dispatch:
    types: [docs-write]

jobs:
  write:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Mint Servantium Bot token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SERVANTIUM_BOT_APP_ID }}
          private-key: ${{ secrets.SERVANTIUM_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk@latest --no-save

      - name: Parse dispatch payload
        id: ctx
        run: |
          # Support both trigger types: workflow_dispatch (inputs) and
          # repository_dispatch (client_payload). Merge into one JSON blob.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            jq -n \
              --arg batch_id "${{ inputs.batch_id }}" \
              --arg pr_number "${{ inputs.pr_number }}" \
              --arg version "${{ inputs.version }}" \
              --arg repo "${{ inputs.repo }}" \
              --argjson approved_actions '${{ inputs.approved_actions }}' \
              '{batch_id: $batch_id, pr_number: $pr_number, version: $version, repo: $repo, approved_actions: $approved_actions}' \
              > /tmp/payload.json
          else
            echo '${{ toJson(github.event.client_payload) }}' > /tmp/payload.json
          fi
          PR=$(jq -r '.pr_number // ""' /tmp/payload.json)
          VERSION=$(jq -r '.version // "auto"' /tmp/payload.json)
          REPO=$(jq -r '.repo // "servantium-website"' /tmp/payload.json)
          BATCH_ID=$(jq -r '.batch_id // ""' /tmp/payload.json)
          TODAY=$(date -u +%Y-%m-%d)
          echo "pr=$PR" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          echo "batch_id=$BATCH_ID" >> $GITHUB_OUTPUT

          # Write approved actions to a file
          jq '.approved_actions // []' /tmp/payload.json > /tmp/approved-actions.json
          echo "$(jq length /tmp/approved-actions.json) approved action(s)"

          # Fetch the PR diff for writer context
          if [ -n "$PR" ]; then
            gh pr view "$PR" --json title,body > /tmp/pr.json 2>/dev/null || echo '{}' > /tmp/pr.json
            gh pr diff "$PR" 2>/dev/null | head -c 50000 > /tmp/diff.txt || echo "" > /tmp/diff.txt
          else
            echo '{}' > /tmp/pr.json
            echo "" > /tmp/diff.txt
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch writer config from portal
        env:
          PORTAL_WEBHOOK_SECRET: ${{ secrets.PORTAL_WEBHOOK_SECRET }}
        run: |
          set +e
          # Fetch base writer prompt
          curl -sS --max-time 8 \
            -H "Authorization: Bearer $PORTAL_WEBHOOK_SECRET" \
            "https://test.internal.servantium.com/api/agents/by-codename/DocsWriter/prompt" \
            -o /tmp/writer-agent.json

          if jq -e '.systemPrompt' /tmp/writer-agent.json > /dev/null 2>&1; then
            jq -r '.systemPrompt' /tmp/writer-agent.json > /tmp/writer-base.md
            jq -r '.postRules // [] | @json' /tmp/writer-agent.json > /tmp/post-rules.json
            jq -r '.bannedWords // [] | @json' /tmp/writer-agent.json > /tmp/banned-words.json
          else
            cp .github/claude-prompts/help-docs-writer.system.md /tmp/writer-base.md
            echo '[]' > /tmp/post-rules.json
            echo '[]' > /tmp/banned-words.json
          fi

          # Fetch content-type overrides
          curl -sS --max-time 8 \
            -H "Authorization: Bearer $PORTAL_WEBHOOK_SECRET" \
            "https://test.internal.servantium.com/api/agents/by-codename/DocsWriter/content-types" \
            -o /tmp/content-types.json 2>/dev/null || echo '[]' > /tmp/content-types.json

      - name: Write docs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-sonnet-4-5
        run: |
          rm -rf /tmp/drafts && mkdir -p /tmp/drafts

          ACTIONS=$(cat /tmp/approved-actions.json)
          COUNT=$(echo "$ACTIONS" | jq length)
          BASE_PROMPT=$(cat /tmp/writer-base.md)
          DIFF=$(cat /tmp/diff.txt)
          PR_TITLE=$(jq -r '.title // ""' /tmp/pr.json)
          PR_BODY=$(jq -r '.body // ""' /tmp/pr.json)
          VERSION="${{ steps.ctx.outputs.version }}"
          REPO="${{ steps.ctx.outputs.repo }}"
          TODAY="${{ steps.ctx.outputs.today }}"

          for i in $(seq 0 $((COUNT - 1))); do
            ACTION=$(echo "$ACTIONS" | jq ".[$i]")
            TYPE=$(echo "$ACTION" | jq -r '.type')
            CONTENT_TYPE=$(echo "$ACTION" | jq -r '.content_type')
            PATH_VAL=$(echo "$ACTION" | jq -r '.path // ""')
            TITLE=$(echo "$ACTION" | jq -r '.title // ""')
            BRIEF=$(echo "$ACTION" | jq -r '.brief // ""')

            echo "=== Action $((i+1))/$COUNT: $TYPE $CONTENT_TYPE $PATH_VAL ==="

            # Get content-type override prompt
            CT_OVERRIDE=$(cat /tmp/content-types.json 2>/dev/null | jq -r --arg ct "$CONTENT_TYPE" '.[] | select(.content_type == $ct) | .prompt_override // ""' 2>/dev/null || echo "")

            # Build the system prompt: base + content-type override
            SYSTEM="$BASE_PROMPT"
            if [ -n "$CT_OVERRIDE" ]; then
              SYSTEM="$SYSTEM

          ## Content-type rules for $CONTENT_TYPE

          $CT_OVERRIDE"
            fi
            echo "$SYSTEM" > /tmp/writer-system.md

            # Build context for this action
            EXISTING_DOC=""
            if [ "$TYPE" = "update" ] && [ -n "$PATH_VAL" ]; then
              FULL_PATH="src/content/docs/help/$PATH_VAL"
              if [ -f "$FULL_PATH" ]; then
                EXISTING_DOC=$(cat "$FULL_PATH")
              fi
            fi

            jq -n \
              --arg action_type "$TYPE" \
              --arg content_type "$CONTENT_TYPE" \
              --arg title "$TITLE" \
              --arg brief "$BRIEF" \
              --arg existing_doc "$EXISTING_DOC" \
              --arg pr_title "$PR_TITLE" \
              --arg pr_body "$PR_BODY" \
              --arg diff "$DIFF" \
              --arg version "$VERSION" \
              --arg repo "$REPO" \
              --arg today "$TODAY" \
              '{action_type: $action_type, content_type: $content_type, title: $title, brief: $brief, existing_doc: $existing_doc, pr_title: $pr_title, pr_body: $pr_body, diff: $diff, version: $version, repo: $repo, today: $today}' \
              > /tmp/writer-context.json

            # Call the writer
            node .github/scripts/claude-run.mjs \
              --system /tmp/writer-system.md \
              --context /tmp/writer-context.json \
              --out /tmp/draft-$i.mdx \
              --model "$CLAUDE_MODEL" \
              --max-tokens 2048

            # Post-process
            RULES=$(cat /tmp/post-rules.json 2>/dev/null || echo '[]')
            if [ "$RULES" != "[]" ] && [ -n "$RULES" ]; then
              node -e "
                const fs = require('fs');
                const rules = JSON.parse(fs.readFileSync('/tmp/post-rules.json', 'utf8'));
                let mdx = fs.readFileSync('/tmp/draft-$i.mdx', 'utf8');
                for (const rule of rules) {
                  if (rule.regex) {
                    mdx = mdx.replace(new RegExp(rule.find, 'gm'), rule.replace);
                  } else {
                    mdx = mdx.split(rule.find).join(rule.replace);
                  }
                }
                fs.writeFileSync('/tmp/draft-$i.mdx', mdx);
              "
            fi

            # Determine output path
            if [ "$TYPE" = "update" ] && [ -n "$PATH_VAL" ]; then
              OUT_PATH="$PATH_VAL"
            elif [ "$CONTENT_TYPE" = "release-note" ]; then
              SLUG=$(echo "$PR_TITLE" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' | head -c 40)
              VSLUG=$(echo "$VERSION" | tr '.' '-')
              OUT_PATH="release-notes/${TODAY}-v${VSLUG}-${SLUG}.mdx"
            else
              SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' | head -c 50)
              SECTION=$(echo "$CONTENT_TYPE" | sed 's/help-guide/guides/; s/glossary/glossary/')
              OUT_PATH="${SECTION}/${SLUG}.mdx"
            fi

            mkdir -p "/tmp/drafts/$(dirname "$OUT_PATH")"
            cp "/tmp/draft-$i.mdx" "/tmp/drafts/$OUT_PATH"
            echo "Wrote /tmp/drafts/$OUT_PATH"
          done

      - name: Open preview PR
        id: openpr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -e
          PR="${{ steps.ctx.outputs.pr }}"
          VERSION="${{ steps.ctx.outputs.version }}"
          BRANCH="bot/docs-${PR:-manual}"

          if [ -z "$(ls -A /tmp/drafts 2>/dev/null)" ]; then
            echo "No draft files produced; skipping PR"
            exit 0
          fi

          git config user.name "servantium-bot[bot]"
          git config user.email "servantium-bot[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          cp -r /tmp/drafts/* src/content/docs/help/
          git add src/content/docs/help

          FILE_COUNT=$(find /tmp/drafts -name "*.mdx" | wc -l | tr -d ' ')
          git commit -m "docs: batch draft v${VERSION} for PR #${PR:-manual} (${FILE_COUNT} files)"
          git push -u origin "$BRANCH"

          # Build PR body listing all files
          FILE_LIST=$(find /tmp/drafts -name "*.mdx" -exec basename {} \; | sort | sed 's/^/- /')
          BASE_BRANCH="${GITHUB_BASE_REF:-feature/astro-prototype}"
          BOT_PR_URL=$(gh pr create \
            --base "$BASE_BRANCH" \
            --head "$BRANCH" \
            --title "docs: v${VERSION} batch for PR #${PR:-manual}" \
            --body "$(printf 'Auto-generated docs batch for PR #%s (v%s).\n\n## Files\n\n%s\n\nReview in the portal, then approve to merge.' "${PR:-manual}" "$VERSION" "$FILE_LIST")")

          echo "bot_pr_url=$BOT_PR_URL" >> $GITHUB_OUTPUT
          BOT_PR_NUMBER=$(echo "$BOT_PR_URL" | sed -E 's|.*/pull/([0-9]+)|\1|')
          echo "bot_pr_number=$BOT_PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Notify portal - drafts complete
        env:
          PORTAL_WEBHOOK_SECRET: ${{ secrets.PORTAL_WEBHOOK_SECRET }}
        run: |
          if [ -z "$PORTAL_WEBHOOK_SECRET" ]; then exit 0; fi

          # Collect all drafted files as JSON
          DRAFTED_FILES='[]'
          for f in $(find /tmp/drafts -name "*.mdx" | sort); do
            REL_PATH=$(echo "$f" | sed 's|/tmp/drafts/||')
            CONTENT=$(cat "$f")
            DRAFTED_FILES=$(echo "$DRAFTED_FILES" | jq --arg p "$REL_PATH" --arg c "$CONTENT" '. + [{path: $p, content: $c}]')
          done

          curl -sS --max-time 15 -X POST \
            -H "Authorization: Bearer $PORTAL_WEBHOOK_SECRET" \
            -H "Content-Type: application/json" \
            https://test.internal.servantium.com/api/pipeline/drafts-complete \
            -d "$(jq -n \
              --arg batch_id "${{ steps.ctx.outputs.batch_id }}" \
              --arg gh_run_id "${{ github.run_id }}" \
              --arg bot_pr_url "${{ steps.openpr.outputs.bot_pr_url }}" \
              --argjson bot_pr_number "${{ steps.openpr.outputs.bot_pr_number || 0 }}" \
              --argjson drafted_files "$DRAFTED_FILES" \
              '{event: "drafts_complete", batch_id: $batch_id, gh_run_id: $gh_run_id, bot_pr_url: $bot_pr_url, bot_pr_number: $bot_pr_number, drafted_files: $drafted_files}')" \
            || echo "Portal webhook failed (non-fatal)"
