name: Build

on:
  push:
    branches: [main, develop, feature/verdant-migration]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pin design-system version
        id: ds-ref
        run: |
          REF=$(cat .design-system-ref 2>/dev/null || echo main)
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Clone design-system at pinned version
        run: |
          git clone https://github.com/servantium/servantium-design-system.git vendor/design-system
          cd vendor/design-system
          git checkout ${{ steps.ds-ref.outputs.ref }}

      - run: npm install
      - run: npm run build
