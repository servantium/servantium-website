name: Build Check

on:
  push:
    branches: [main, develop, feature/astro-prototype, feature/verdant-migration]
  pull_request:
    branches: [main, develop, feature/astro-prototype]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Verify build output
        run: |
          echo "Build output:"
          ls -la dist/
          echo "---"
          echo "Page count: $(find dist -name '*.html' | wc -l)"
