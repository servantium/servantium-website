name: Build

on:
  push:
    branches: [main, develop, feature/verdant-migration]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Clone design-system (provides @servantium/grove + verdant)
        run: git clone --depth 1 https://github.com/servantium/servantium-design-system.git vendor/design-system

      - run: npm install
      - run: npm run build
