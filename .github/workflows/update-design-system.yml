name: Update design-system pin

on:
  repository_dispatch:
    types: [design-system-updated]
  workflow_dispatch:
    inputs:
      ref:
        description: 'design-system git ref (tag or SHA)'
        required: true
        default: 'main'

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop

      - name: Resolve incoming ref
        id: incoming
        run: |
          REF="${{ github.event.client_payload.ref || github.event.inputs.ref }}"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Update .design-system-ref
        id: bump
        run: |
          OLD=$(cat .design-system-ref 2>/dev/null || echo "")
          NEW="${{ steps.incoming.outputs.ref }}"
          if [ "$OLD" = "$NEW" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$NEW" > .design-system-ref
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="bot/design-system-${{ steps.bump.outputs.new }}"
          git config user.email "247631937+chris-servantium@users.noreply.github.com"
          git config user.name "Servantium Bot"
          git checkout -b "$BRANCH"
          git add .design-system-ref
          git commit -m "chore(design-system): bump to ${{ steps.bump.outputs.new }}

Previous: ${{ steps.bump.outputs.old }}
Merging to develop previews on test.servantium.com."
          git push -u origin "$BRANCH"
          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore(design-system): bump to ${{ steps.bump.outputs.new }}" \
            --body "Automated bump from \`${{ steps.bump.outputs.old }}\` to \`${{ steps.bump.outputs.new }}\`.

Merging to \`develop\` deploys to test.servantium.com for review.
After verification, promote \`develop\` → \`main\` to ship to servantium.com."
